<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ravenwood Manor, an idle clicker game set in a haunted estate." />

  <title>Auto Clicker | Ravenwood Manor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Lora:wght@400;500;600&family=MedievalSharp&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <main class="game-wrapper">
    <!-- ========================================= -->
    <!-- ==========   GAME LAYOUT   ========== -->
    <!-- ========================================= -->
    <section class="game-layout">
      <!-- ========================================= -->
      <!-- ==========   LEFT COLUMN   ========== -->
      <!-- ========================================= -->
      <aside class="side-column">
        <!-- ========================================= -->
        <!-- ==========   COUNTER SECTION   ========== -->
        <!-- ========================================= -->
        <section id="counter-section" class="ornate-panel counter-section">
          <div class="spook-counter-main">
            <img src="assets/images/spook-counter.png" alt="Spook Icon" class="spook-icon">
            <div class="spook-counter-info">
              <h4>Spooks</h4>
              <p id="spook-count">0</p>
              <div class="spook-rates">
                <p id="spook-rate-per-second">Per second: <span>0</span></p>
                <p id="spook-rate-per-click">Per click: <span>1</span></p>
              </div>
            </div>
          </div>
          <button id="collect-spooks-button" class="collect-button">Collect Spooks</button>
          <hr>
          <div id="decay-counter" class="currency-counter">
            <img src="assets/images/decay-counter.png" alt="Decay Icon" class="currency-icon">
            <div class="currency-info">
              <p class="currency-name">Decay</p>
              <p id="decay-count" class="currency-amount">0</p>
            </div>
          </div>
          <hr>
          <div id="gold-counter" class="currency-counter">
            <img src="assets/images/gold-counter.png" alt="Gold Icon" class="currency-icon">
            <div class="currency-info">
              <p class="currency-name">Gold</p>
              <p id="gold-count" class="currency-amount">0</p>
            </div>
          </div>
          <hr>
          <div id="ectoplasm-counter" class="currency-counter">
            <img src="assets/images/ectoplasm-counter.png" alt="Ectoplasm Icon" class="currency-icon">
            <div class="currency-info">
              <p class="currency-name">Ectoplasm</p>
              <p id="ectoplasm-count" class="currency-amount">0</p>
            </div>
          </div>


        </section>
        <section id="entities-section" class="ornate-panel entities-section"></section>
        <section id="upgrades-section" class="ornate-panel upgrades-section"></section>
      </aside>

      <!-- ========================================= -->
      <!-- ==========   CENTER COLUMN   ========== -->
      <!-- ========================================= -->
      <section class="center-column">
        <!-- ========================================= -->
        <!-- ==========   HERO SECTION   ========== -->
        <!-- ========================================= -->
        <section class="hero">
          <div class="hero-content">
            <h1 id="game-title">Ravenwood Manor</h1>
            <p class="subtitle"><span></span>An idle clicker game<span></span></p>
          </div>
        </section>

        <!-- ========================================= -->
        <!-- ==========   ROOM GRID   ========== -->
        <!-- ========================================= -->
        <section class="room-grid">
          <article id="library-room" class="room-card">Library</article>
          <article id="kitchen-room" class="room-card">Kitchen</article>
          <article id="bedroom-room" class="room-card">Bedroom</article>
          <article id="ballroom-room" class="room-card">Ballroom</article>
          <article id="basement-room" class="room-card">Basement</article>
          <article id="dressing-room" class="room-card">Dressing room</article>
        </section>
      </section>

      <!-- ========================================= -->
      <!-- ==========   RIGHT COLUMN   ========== -->
      <!-- ========================================= -->
      <aside class="side-column">
        <section id="graveyard-section" class="ornate-panel graveyard-section"></section>
        <section id="decay-section" class="ornate-panel decay-section"></section>
        <section id="graveyard-upgrades-section" class="ornate-panel graveyard-upgrades-section"></section>
      </aside>
    </section>
  </main>
  <script src="scripts.js"></script>
</body>

</html>
